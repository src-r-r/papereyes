<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paper4Eyes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 280px;
      padding: 16px;
      color: #1a1a1a;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .domain {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-row label {
      font-size: 14px;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #4a90d9; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .status {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }
    .footer {
      margin-top: 12px;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #4a90d9;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Paper4Eyes</h1>
  </div>
  <div class="domain" id="domain">loading...</div>
  <div class="toggle-row">
    <label for="toggle">Paper texture</label>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status"></div>
  <div class="footer">
    <a href="#" id="options-link">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
