<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PaperEyes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 300px;
      padding: 16px;
      color: #1a1a1a;
    }
    .header {
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .domain {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
      word-break: break-all;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .toggle-row label {
      font-size: 14px;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .switch .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #4a90d9; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .controls {
      margin-top: 12px;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .control-row label {
      font-size: 12px;
      min-width: 80px;
      color: #444;
    }
    .control-row input[type="range"] { flex: 1; }
    .control-row select {
      flex: 1;
      padding: 2px 4px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
    }
    .control-row .val {
      font-size: 11px;
      color: #888;
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 12px 0;
    }
    .status {
      font-size: 11px;
      color: #999;
      margin-top: 8px;
      text-align: center;
    }
    .footer {
      margin-top: 10px;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #4a90d9;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    .disabled .control-row { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PaperEyes</h1>
  </div>
  <div class="domain" id="domain" aria-hidden="true">loading...</div>
  <div class="toggle-row">
    <label for="toggle">Paper texture</label>
    <label class="switch" role="switch">
      <input type="checkbox" id="toggle" role="switch">
      <span class="slider"></span>
    </label>
  </div>

  <div class="controls" id="controls">
    <div class="control-row">
      <label for="opacity">Intensity</label>
      <input type="range" id="opacity" min="0" max="100" value="15" aria-valuemin="0" aria-valuemax="100" aria-valuenow="15">
      <span class="val" id="opacity-val">15%</span>
    </div>
    <div class="control-row">
      <label for="blur">Grain size</label>
      <input type="range" id="blur" min="0" max="10" step="0.5" value="1" aria-valuemin="0" aria-valuemax="10" aria-valuenow="1">
      <span class="val" id="blur-val">1px</span>
    </div>
    <div class="control-row">
      <label for="mix-mode">Blend mode</label>
      <select id="mix-mode">
        <option value="multiply">Multiply</option>
        <option value="overlay">Overlay</option>
        <option value="soft-light">Soft Light</option>
        <option value="screen">Screen</option>
        <option value="color-dodge">Color Dodge</option>
        <option value="hard-light">Hard Light</option>
      </select>
    </div>
  </div>

  <hr class="divider">
  <div class="status" id="status" role="status" aria-live="polite"></div>
  <div class="footer">
    <a href="#" id="options-link">Manage domains</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
