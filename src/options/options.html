<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paper4Eyes Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      max-width: 560px;
      color: #1a1a1a;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    h2 { font-size: 15px; margin-bottom: 12px; font-weight: 600; }
    .section { margin-bottom: 28px; }
    .control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .control label {
      min-width: 140px;
      font-size: 14px;
    }
    .control input[type="range"] { flex: 1; }
    .control .value {
      min-width: 40px;
      text-align: right;
      font-size: 13px;
      color: #666;
      font-variant-numeric: tabular-nums;
    }
    .domain-list {
      list-style: none;
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
    }
    .domain-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .domain-list li:last-child { border-bottom: none; }
    .domain-list li:hover { background: #fafafa; }
    .domain-list .domain-name {
      color: #333;
      word-break: break-all;
      flex: 1;
      margin-right: 12px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #4a90d9; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .empty { padding: 16px; text-align: center; color: #999; font-size: 13px; }
    .save-note {
      font-size: 12px;
      color: #999;
      text-align: right;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Paper4Eyes Settings</h1>

  <div class="section">
    <h2>Texture</h2>
    <div class="control">
      <label for="opacity">Noise intensity</label>
      <input type="range" id="opacity" min="0" max="100" value="15">
      <span class="value" id="opacity-value">15%</span>
    </div>
    <div class="control">
      <label for="blur">Noise size</label>
      <input type="range" id="blur" min="0" max="10" step="0.5" value="1">
      <span class="value" id="blur-value">1px</span>
    </div>
  </div>

  <div class="section">
    <h2>Domains</h2>
    <ul class="domain-list" id="domain-list"></ul>
    <div class="empty" id="no-domains">No domains configured yet.</div>
  </div>

  <div class="save-note">Settings are saved automatically</div>

  <script src="options.js"></script>
</body>
</html>
